<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Dashboard</title>

<style>

body{
    background:#0f172a;
    color:white;
    font-family:Arial;
    padding:20px;
}

h1{
    color:gold;
    margin-bottom:20px;
}

.student{
    background:#1e293b;
    padding:20px;
    border-radius:15px;
    margin-bottom:20px;
}

button{
    background:gold;
    color:black;
    border:none;
    padding:10px 15px;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    background:white;
}

</style>
</head>
<body>

<h1>Admin Dashboard</h1>
<input
type="text"
id="search"
placeholder="Search student..."
onkeyup="searchStudent()"
style="
width:100%;
padding:15px;
border:none;
border-radius:10px;
margin-bottom:20px;
"
/>
<div id="students"></div>

<script>

const adminPin = prompt("Enter Admin PIN");

async function loadStudents(search=""){

    const res = await fetch("/students",{

        headers:{
            pin: adminPin
        }

    });

    const students = await res.json();

    let html = "";

    const filtered = students.filter(student => {

        const name =
        (student.fullName || "").toLowerCase();

        const id =
        (student.studentId || "").toLowerCase();

        return (
            name.includes(search.toLowerCase()) ||
            id.includes(search.toLowerCase())
        );

    });

    filtered.forEach(student=>{

        html += `

        <div class="student">

            <h2>${student.fullName || "No Name"}</h2>

            <p><b>Student ID:</b>
            ${student.studentId || "N/A"}</p>

            <p><b>Email:</b>
            ${student.email || "N/A"}</p>

            <p><b>Phone:</b>
            ${student.phone || "N/A"}</p>

            <p><b>Gender:</b>
            ${student.gender || "N/A"}</p>

            <p><b>Career:</b>
            ${student.career || "N/A"}</p>

            <p><b>Class Type:</b>
            ${student.classType || "N/A"}</p>

            <p><b>Address:</b>
            ${student.address || "N/A"}</p>

            <p><b>Payment:</b>
            ${student.paymentStatus || "pending"}</p>

            <p><b>ID Card:</b>
            ${student.idCardStatus || "Not Applied"}</p>

            ${
student.idCardStatus === "approved"
?
`<button disabled>Approved</button>`
:
`<button onclick="approve('${student.id}')">
Approve ID Card
</button>`
}

<button
onclick="deleteStudent('${student.id}')"
style="background:red;color:white;margin-left:10px;"
>
Delete
</button>

        </div>

        `;

    });

    document.getElementById("students").innerHTML = html;

}
async function approve(id){

    await fetch("/approve-id",{

        method:"POST",

        headers:{
            "Content-Type":"application/json",
            pin: adminPin
        },

        body:JSON.stringify({ id })

    });

    alert("ID Card Approved");

    loadStudents();

}

async function deleteStudent(id){

    const confirmDelete =
    confirm("Delete this student?");

    if(!confirmDelete) return;

    await fetch("/delete-student",{

        method:"POST",

        headers:{
            "Content-Type":"application/json",
            pin: adminPin
        },

        body:JSON.stringify({ id })

    });

    alert("Student Deleted");

    loadStudents();

}

function searchStudent(){

    const value =
    document.getElementById("search").value;

    loadStudents(value);

}

loadStudents();

</script>

</body>
</html>
