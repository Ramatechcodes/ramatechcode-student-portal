<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Dashboard</title>

<style>

body{
    background:#0f172a;
    color:white;
    font-family:Arial;
    padding:20px;
}

h1{
    color:gold;
    margin-bottom:20px;
}

.student{
    background:#1e293b;
    padding:20px;
    border-radius:15px;
    margin-bottom:20px;
}

button{
    background:gold;
    color:black;
    border:none;
    padding:10px 15px;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    background:white;
}

</style>
</head>
<body>

<h1>Admin Dashboard</h1>
<input
type="text"
id="search"
placeholder="Search student..."
onkeyup="searchStudent()"
style="
width:100%;
padding:15px;
border:none;
border-radius:10px;
margin-bottom:20px;
"
/>
  <div class="student">

<h2>Live Class Link</h2>

<input
type="text"
id="classLink"
placeholder="Paste Zoom or Google Meet link"
style="
width:100%;
padding:15px;
border:none;
border-radius:10px;
margin-top:10px;
"
/>

<button onclick="saveClassLink()">
Save Live Class Link
</button>

</div>

<div class="student">

<h2>Add Assignment</h2>

<input
type="text"
id="assignmentTitle"
placeholder="Assignment Title"
style="
width:100%;
padding:15px;
border:none;
border-radius:10px;
margin-top:10px;
"
/>

<textarea
id="assignmentDetails"
placeholder="Assignment Details"
style="
width:100%;
padding:15px;
height:120px;
border:none;
border-radius:10px;
margin-top:10px;
"
></textarea>

<button onclick="addAssignment()">
Upload Assignment
</button>

</div> 
    <div class="student">

<h2>All Assignments</h2>

<div id="allAssignments"></div>

</div>
<div id="students"></div>

<script>

const adminPin = prompt("Enter Admin PIN");

async function loadStudents(search=""){

    const res = await fetch("/students",{

        headers:{
            pin: adminPin
        }

    });

    const students = await res.json();

    let html = "";

    const filtered = students.filter(student => {

        const name =
        (student.fullName || "").toLowerCase();

        const id =
        (student.studentId || "").toLowerCase();

        return (
            name.includes(search.toLowerCase()) ||
            id.includes(search.toLowerCase())
        );

    });

    filtered.forEach(student=>{

        html += `

        <div class="student">

            <h2>${student.fullName || student.fullname || "No Name"}</h2>

            <p><b>Student ID:</b>
            ${student.studentId || "N/A"}</p>

            <p><b>Email:</b>
            ${student.email || "N/A"}</p>

            <p><b>Phone:</b>
            ${student.phone || "N/A"}</p>

            <p><b>Gender:</b>
            ${student.gender || "N/A"}</p>

            <p><b>Career:</b>
            ${student.career || student.interest || "N/A"}</p>

            <p><b>Class Type:</b>
            ${student.classType || student.classOption || "N/A"}</p>

            <p><b>Address:</b>
            ${student.address || "N/A"}</p>

            <p><b>Payment:</b>
            ${student.paymentStatus || "pending"}</p>

            <p><b>ID Card:</b>
            ${student.idCardStatus || "Not Applied"}</p>

            ${
student.idCardStatus === "approved"
?
`<button disabled>Approved</button>`
:
`<button onclick="approve('${student.id}')">
Approve ID Card
</button>`
}

<button
onclick="deleteStudent('${student.id}')"
style="background:red;color:white;margin-left:10px;"
>
Delete
</button>

        </div>

        `;

    });

    document.getElementById("students").innerHTML = html;

}
    async function saveClassLink(){

const link =
document.getElementById("classLink").value;

const res = await fetch("/update-class-link",{

method:"POST",

headers:{
"Content-Type":"application/json",
pin: adminPin
},

body:JSON.stringify({ link })

});

const data = await res.json();

if(data.success){

alert("Live Class Link Updated");

}else{

alert("Failed");

}

}

async function addAssignment(){

const title =
document.getElementById("assignmentTitle").value;

const details =
document.getElementById("assignmentDetails").value;

if(!title || !details){

alert("Fill all fields");

return;

}

const res = await fetch("/add-assignment",{

method:"POST",

headers:{
"Content-Type":"application/json",
pin: adminPin
},

body:JSON.stringify({
title,
details
})

});

const data = await res.json();

if(data.success){

alert("Assignment Uploaded");

document.getElementById("assignmentTitle").value = "";
document.getElementById("assignmentDetails").value = "";

loadAssignmentsAdmin();

}else{

alert("Upload Failed");

}

}
    async function loadAssignmentsAdmin(){

const res = await fetch("/assignments");

const assignments = await res.json();

let html = "";

assignments.forEach(item=>{

html += `

<div class="student">

<h3>${item.title}</h3>

<p>${item.details}</p>

<button
onclick="deleteAssignment('${item.id}')"
style="background:red;color:white;"
>
Delete Assignment
</button>

</div>

`;

});

document.getElementById("allAssignments").innerHTML = html;

}
    async function deleteAssignment(id){

const confirmDelete =
confirm("Delete this assignment?");

if(!confirmDelete) return;

const res = await fetch("/delete-assignment",{

method:"POST",

headers:{
"Content-Type":"application/json",
pin: adminPin
},

body:JSON.stringify({ id })

});

const data = await res.json();

if(data.success){

alert("Assignment Deleted");

loadAssignmentsAdmin();

}else{

alert("Delete Failed");

}

}
async function approve(id){

    await fetch("/approve-id",{

        method:"POST",

        headers:{
            "Content-Type":"application/json",
            pin: adminPin
        },

        body:JSON.stringify({ id })

    });

    alert("ID Card Approved");

    loadStudents();

}

async function deleteStudent(id){

    const confirmDelete =
    confirm("Delete this student?");

    if(!confirmDelete) return;

    await fetch("/delete-student",{

        method:"POST",

        headers:{
            "Content-Type":"application/json",
            pin: adminPin
        },

        body:JSON.stringify({ id })

    });

    alert("Student Deleted");

    loadStudents();

}

function searchStudent(){

    const value =
    document.getElementById("search").value;

    loadStudents(value);

}

loadStudents();
    loadAssignmentsAdmin();

</script>

</body>
</html>
