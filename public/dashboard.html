<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Dashboard</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0f172a;
    color:white;
    font-family:Arial;
    padding:20px;
}

.header{
    background:#020617;
    padding:20px;
    border-radius:15px;
    border:2px solid gold;
    margin-bottom:20px;
}

.header h1{
    color:gold;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:20px;
}

.card{
    background:#1e293b;
    padding:20px;
    border-radius:15px;
}

.card h2{
    color:gold;
    margin-bottom:15px;
}

button{
    background:gold;
    color:black;
    border:none;
    padding:12px 18px;
    border-radius:10px;
    font-weight:bold;
    cursor:pointer;
    margin-top:10px;
}

button:hover{
    background:white;
}

select{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    margin-top:10px;
}

.status{
    margin-top:10px;
    padding:10px;
    border-radius:10px;
    font-weight:bold;
}

.pending{
    background:orange;
    color:black;
}

.approved{
    background:green;
}

.id-card{
    background:white;
    color:black;
    border-radius:15px;
    overflow:hidden;
    margin-top:20px;
}

.id-top{
    background:#020617;
    color:white;
    padding:15px;
    text-align:center;
}

.id-top h2{
    color:gold;
}

.id-body{
    padding:20px;
}

.id-body p{
    margin:10px 0;
}

.id-back{
    background:#e2e8f0;
    padding:20px;
}

</style>
</head>
<body>

<div class="header">
    <h1>Student Dashboard</h1>
</div>

<div class="grid">

<div class="card">

    <h2>Student Profile</h2>

    <div id="profile"></div>

</div>
<div class="card">

<h2>Join Class WhatsApp Group</h2>

<select id="groupSelect">

<option value="">
Select Your Tech Career
</option>

<option value="https://chat.whatsapp.com/GVG5MbfaIgPKJVS6lxbrRl">
Full Stack Development
</option>

<option value="https://chat.whatsapp.com/C4ueKEgwPGFFunKI1M688P">
Robotics & AI
</option>

<option value="https://chat.whatsapp.com/BlTbdSMaItRIgT82Pf62pC">
Python Programming
</option>

</select>

<button onclick="joinGroup()">
Join WhatsApp Group
</button>

</div>

<div class="card">

    <h2>ID Card</h2>

    <button onclick="previewCard()">
        Preview ID Card
    </button>

    <button onclick="applyId()">
        Apply For ID Card
    </button>

    <div id="idStatus"></div>

    <div id="preview"></div>

</div>
<div class="card">

<h2>Live Video Class</h2>

<div id="liveClass"></div>

</div>
</div>
<div class="card">

<h2>Assignments</h2>

<div id="assignments"></div>

</div>
<script>

let student;

async function loadStudent(){

const localStudent =
JSON.parse(localStorage.getItem("student"));

const res = await fetch("/student-data",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
studentId: localStudent.studentId
})

});

const data = await res.json();

student = data.student;

localStorage.setItem(
"student",
JSON.stringify(student)
);

document.getElementById("profile").innerHTML = `

<p><b>Name:</b>
${student.fullName || student.fullname || "N/A"}</p>

<p><b>Student ID:</b>
${student.studentId || "N/A"}</p>

<p><b>Email:</b>
${student.email || "N/A"}</p>

<p><b>Phone:</b>
${student.phone || "N/A"}</p>

<p><b>Gender:</b>
${student.gender || "N/A"}</p>

<p><b>Career:</b>
${student.career || student.interest || "N/A"}</p>

<p><b>Class Type:</b>
${student.classType || student.classOption || "N/A"}</p>

`;

if(student.idCardStatus === "pending"){

document.getElementById("idStatus").innerHTML = `

<div class="status pending">
ID Card Pending Approval
</div>

`;

}

if(student.idCardStatus === "approved"){

document.getElementById("idStatus").innerHTML = `

<div class="status approved">

<p>
ID Card Approved - Ready To Print
</p>

<button onclick="printIdCard()">
Click Here To Print
</button>

</div>

`;

}

}

loadStudent();


function joinGroup(){

const link =
document.getElementById("groupSelect").value;

if(!link){

alert("Select a class");

return;

}

window.open(link,"_blank");

}
    async function loadAssignments(){

const res =
await fetch("/assignments");

const data = await res.json();

let html = "";

data.forEach(item=>{

html += `

<div class="status pending">

<h3>${item.title}</h3>

<p>${item.details}</p>

</div>

`;

});

document.getElementById(
"assignments"
).innerHTML = html;

}

loadAssignments();
    async function joinLiveClass(){

const res = await fetch("/class-link");

const data = await res.json();

if(data.liveClassLink){

window.open(data.liveClassLink,"_blank");

}else{

alert("No live class currently");

}

}
async function applyId(){

if(!student){

alert("Student data not loaded");

return;

}

const res = await fetch("/apply-id",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
studentId: student.studentId
})

});

const data = await res.json();

if(data.success){

student.idCardStatus = "pending";

localStorage.setItem(
"student",
JSON.stringify(student)
);

document.getElementById("idStatus").innerHTML = `

<div class="status pending">
ID Card Pending Approval
</div>

`;

alert("ID Card Application Submitted");

}else{

alert("Application Failed");

}

}
function previewCard(){

const status =
student.idCardStatus || "pending";

document.getElementById("preview").innerHTML = `

<div class="id-card">

<div class="id-top">

<h2>RAMATECHCODE</h2>

<p>LAB TECHNOLOGY</p>

</div>

<div class="id-body">

<div style="text-align:center;margin-bottom:20px;">

<img
src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png"
style="
width:90px;
height:90px;
border-radius:50%;
border:3px solid gold;
"
/>

</div>

<p><b>Full Name:</b>
${student.fullName || student.fullname}</p>

<p><b>Student ID:</b>
${student.studentId}</p>

<p><b>Course:</b>
${student.career || student.interest}</p>

<p><b>Class Type:</b>
${student.classType || student.classOption}</p>

<p>
<b>Status:</b>

<span style="
color:${
status === "approved"
? "green"
: "orange"
};
font-weight:bold;
">
${status.toUpperCase()}
</span>

</p>
<!-- STUDENT SIGNATURE -->

<div style="text-align:center;">

<div style="
width:120px;
height:60px;
border-bottom:2px solid black;
margin:auto;
"></div>

<hr style="width:120px;">

<p style="
font-size:13px;
font-weight:bold;
">
Student Signature
</p>

</div>

<div class="id-back">

<h3 style="margin-bottom:10px;">
Ramatechcode Lab Technology
</h3>

<p style="margin-bottom:10px;">
This ID card remains the property of
Ramatechcode Lab Technology.
</p>

<p style="margin-bottom:10px;">
If found, kindly return it to the nearest
Ramatechcode office or the nearest police station.
</p>

<p style="margin-bottom:20px;">
Unauthorized use of this card is prohibited.
</p>

<div style="
margin-top:30px;
display:flex;
justify-content:space-between;
align-items:flex-end;
gap:20px;
">

<!-- COMPANY SIGNATURE -->

<div style="text-align:center;">

<img
src="/img.png"
style="
width:120px;
height:60px;
object-fit:contain;
display:block;
margin:auto;
"
/>

<hr style="width:120px;">

<p style="
font-size:13px;
font-weight:bold;
">
Authorized Signature
</p>

</div>

<!-- STUDENT SIGNATURE -->

<div style="text-align:center;">

<div style="
width:120px;
height:60px;
border-bottom:2px solid black;
margin:auto;
"></div>

<hr style="width:120px;">

<p style="
font-size:13px;
font-weight:bold;
">
Student Signature
</p>

</div>

</div>

</div>
`;

}
 function printIdCard(){

previewCard();

const printContents =
document.getElementById("preview").innerHTML;

const newWindow = window.open("", "", "width=400,height=700");

newWindow.document.write(`

<html>

<head>

<title>Print ID Card</title>

<style>

body{
font-family:Arial;
padding:20px;
background:white;
}

.id-card{
width:320px;
margin:auto;
background:white;
color:black;
border-radius:15px;
overflow:hidden;
border:2px solid #000;
}

.id-top{
background:#020617;
color:white;
padding:15px;
text-align:center;
}

.id-top h2{
color:gold;
}

.id-body{
padding:20px;
}

.id-back{
background:#e2e8f0;
padding:20px;
}

img{
width:90px;
height:90px;
border-radius:50%;
border:3px solid gold;
}

</style>

</head>

<body>

${printContents}

<script>

window.onload = function(){

window.print();

}

<\/script>

</body>

</html>

`);

newWindow.document.close();

}   
async function loadClassLink(){

const res = await fetch("/class-link");

const data = await res.json();

if(data.liveClassLink){

document.getElementById("liveClass").innerHTML = `

<a href="${data.liveClassLink}" target="_blank">

<button>
Join Live Class
</button>

</a>

`;

}

}

loadClassLink();
</script>

</body>
</html>
