<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Dashboard</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0f172a;
    color:white;
    font-family:Arial;
    padding:20px;
}

.header{
    background:#020617;
    padding:20px;
    border-radius:15px;
    border:2px solid gold;
    margin-bottom:20px;
}

.header h1{
    color:gold;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:20px;
}

.card{
    background:#1e293b;
    padding:20px;
    border-radius:15px;
}

.card h2{
    color:gold;
    margin-bottom:15px;
}

button{
    background:gold;
    color:black;
    border:none;
    padding:12px 18px;
    border-radius:10px;
    font-weight:bold;
    cursor:pointer;
    margin-top:10px;
}

button:hover{
    background:white;
}

select{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    margin-top:10px;
}

.status{
    margin-top:10px;
    padding:10px;
    border-radius:10px;
    font-weight:bold;
}

.pending{
    background:orange;
    color:black;
}

.approved{
    background:green;
}

.id-card{
    background:white;
    color:black;
    border-radius:15px;
    overflow:hidden;
    margin-top:20px;
}

.id-top{
    background:#020617;
    color:white;
    padding:15px;
    text-align:center;
}

.id-top h2{
    color:gold;
}

.id-body{
    padding:20px;
}

.id-body p{
    margin:10px 0;
}

.id-back{
    background:#e2e8f0;
    padding:20px;
}

</style>
</head>
<body>

<div class="header">
    <h1>Student Dashboard</h1>
</div>

<div class="grid">

<div class="card">

    <h2>Student Profile</h2>

    <div id="profile"></div>

</div>

<div class="card">

    <h2>Tech Course Payment</h2>

    <p>Total Course Fee: ₦350,000</p>

    <select id="paymentPlan">

        <option value="350000|100%">
            100% - ₦350,000
        </option>

        <option value="210000|60%">
            60% - ₦210,000
        </option>

        <option value="140000|40%">
            40% - ₦140,000
        </option>

    </select>

    <button onclick="payCourse()">
        Pay For Tech Course
    </button>

    <button onclick="viewHistory()">
  View Payment History
</button>
<div id="paymentHistory"></div>
</div>

<div class="card">

    <h2>ID Card</h2>

    <button onclick="previewCard()">
        Preview ID Card
    </button>

    <button onclick="applyId()">
        Apply For ID Card
    </button>

    <div id="idStatus"></div>

    <div id="preview"></div>

</div>

</div>

<script>

let student;

async function loadStudent(){

const localStudent =
JSON.parse(localStorage.getItem("student"));

const res = await fetch("/student-data",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
studentId: localStudent.studentId
})

});

const data = await res.json();

student = data.student;

localStorage.setItem(
"student",
JSON.stringify(student)
);

document.getElementById("profile").innerHTML = `

<p><b>Name:</b> ${student.fullName}</p>

<p><b>Student ID:</b> ${student.studentId}</p>

<p><b>Career:</b> ${student.career}</p>

<p><b>Registration Fee:</b> ${student.paymentStatus}</p>

`;

if(student.idCardStatus === "pending"){

document.getElementById("idStatus").innerHTML = `

<div class="status pending">
ID Card Pending Approval
</div>

`;

}

if(student.idCardStatus === "approved"){

document.getElementById("idStatus").innerHTML = `

<div class="status approved">
ID Card Approved - Ready To Print
</div>

`;

}

}

loadStudent();

document.getElementById("profile").innerHTML = `

<p><b>Name:</b> ${student.fullName}</p>

<p><b>Student ID:</b> ${student.studentId}</p>

<p><b>Career:</b> ${student.career}</p>

<p><b>Registration Fee:</b> ${student.paymentStatus}</p>

`;

if(student.coursePayment){

document.getElementById("paymentHistory").innerHTML = `

<div class="status approved">

Course Payment:
${student.coursePayment.percentage}
Paid Successfully

</div>

`;

}

if(student.idCardStatus === "pending"){

document.getElementById("idStatus").innerHTML = `

<div class="status pending">
ID Card Pending Approval
</div>

`;

}

if(student.idCardStatus === "approved"){

document.getElementById("idStatus").innerHTML = `

<div class="status approved">
ID Card Approved
</div>

`;

}

async function payCourse(){

    const paymentData =
    document.getElementById("paymentPlan").value;

    const splitData = paymentData.split("|");

    const amount = splitData[0];

    const percentage = splitData[1];

    const response = await fetch("/pay-course",{

      method:"POST",

      headers:{
        "Content-Type":"application/json"
      },

      body:JSON.stringify({

        studentId:student.studentId,
        amount:Number(amount),
        percentage

      })

    });

    const data = await response.json();

    if(data.success){

      window.location.href = data.link;

    }else{

      alert("Payment Failed");

    }

}
function viewHistory(){

  let history = `
    Registration Fee:
    ${student.paymentStatus}
  `;

  if(student.coursePayment){

    history += `

    Course Payment:
    ₦${Number(
      student.coursePayment.amount
    ).toLocaleString()}

    Status:
    ${student.coursePayment.status}
    `;
  }

  alert(history);

}
async function applyId(){

const res = await fetch("/apply-id",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

studentId:student.studentId

})

});

const data = await res.json();
if(data.success){

    student.idCardStatus = "pending";

    localStorage.setItem(
      "student",
      JSON.stringify(student)
    );

    document.getElementById("idStatus").innerHTML = `
        <div class="status pending">
            Pending Approval
        </div>
    `;

    alert("ID Card Application Submitted");
}

}
function previewCard(){

const status =
student.idCardStatus || "pending";

document.getElementById("preview").innerHTML = `

<div class="id-card">

<div class="id-top">

<h2>RAMATECHCODE</h2>

<p>LAB TECHNOLOGY</p>

</div>

<div class="id-body">

<div style="text-align:center;margin-bottom:20px;">

<img
src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png"
style="
width:90px;
height:90px;
border-radius:50%;
border:3px solid gold;
"
/>

</div>

<p><b>Full Name:</b>
${student.fullName}</p>

<p><b>Student ID:</b>
${student.studentId}</p>

<p><b>Course:</b>
${student.career}</p>

<p><b>Class Type:</b>
${student.classType}</p>

<p>
<b>Status:</b>

<span style="
color:${
status === "approved"
? "green"
: "orange"
};
font-weight:bold;
">
${status.toUpperCase()}
</span>

</p>

</div>

<div class="id-back">

<h3>Ramatechcode Lab Technology</h3>

<p>
This card remains property of
Ramatechcode Lab Technology.
</p>

<p>
If found kindly return to management.
</p>

<p>
Authorized Signature
</p>

</div>

</div>

`;

}
</script>

</body>
</html>
